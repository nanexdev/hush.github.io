<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zamknij m*rde wariacie</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      .frame {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
      }

      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        user-select: none;
        pointer-events: none;
      }

      audio {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <img src="hush.jpg" alt="Background image" />
    </div>

    <audio id="bg-audio" autoplay loop preload="auto">
      <source src="motto.mp3" type="audio/mpeg" />
    </audio>

    <script>
      const audio = document.getElementById('bg-audio');

      const tryPlay = () => {
        audio.play().catch(() => {
          // Some browsers require a user gesture before autoplaying audio.
        });
      };

      window.addEventListener('load', tryPlay);
      window.addEventListener('click', tryPlay, { once: true });
      window.addEventListener('touchstart', tryPlay, { once: true });
    </script>
  </body>
</html>
